openapi: 3.0.3
info:
  title: Surfreport API
  version: 1.0.0
  description: API for retrieving surf conditions for beaches

servers:
  - url: https://api.surfreport.com/v1

paths:
  /surfreport/{beachId}:
    get:
      summary: Get surf report for a beach
      parameters:
        - name: beachId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the beach

      responses:
        "200":
          description: Success

parameters:
  - name: beachId

        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 3
          description: Number of forecast days to return (max 7)

        - name: time
          in: query
          required: false
          schema:
            type: integer
          description: Unix timestamp in milliseconds (UTC)

        - name: units
          in: query
          required: false
          schema:
            type: string
            enum: [imperial, metric]
            default: imperial
          description: Unit system for values (temperature, wave height)
